<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Divine Admin</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--sp-xl) var(--sp-lg);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-xl);
            padding-bottom: var(--sp-md);
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            margin-bottom: var(--sp-md);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--sp-md);
        }

        @media(max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: var(--sp-md);
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--secondary-color);
            outline: none;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            padding: 40px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
        }

        .drop-zone.dragover {
            border-color: var(--primary-color);
            background: #eef2ff;
        }

        .preview-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 20px;
        }

        .data-table th,
        .data-table td {
            padding: var(--sp-md);
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            background-color: var(--secondary-color);
        }

        .status-badge {
            padding: 4px 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 4px;
            font-weight: 600;
        }

        .status-danger {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        .status-warning {
            background-color: #fef3c7;
            color: #b45309;
        }

        .status-success {
            background-color: #e2f5e9;
            color: #1a7f37;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            background: none;
            border: 1px solid var(--border-color);
        }

        .btn-danger {
            color: #b91c1c;
            border-color: #b91c1c;
        }

        .btn-edit {
            color: var(--primary-color);
            border-color: var(--primary-color);
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="owner-dashboard.html" class="nav-link">← Back to Dashboard</a>
        </div>
        <div class="nav-center">
            <a href="index.html" class="logo">DIVINE.</a>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-link" style="color: var(--primary-color);">Admin Products</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="dashboard-title" style="font-size: 2rem;">Manage Products</h1>
        </div>

        <section style="background: #fff; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 40px;">
            <h2 class="section-title">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="editProductId" value="">

                <div class="form-group">
                    <label>Product Images (Drag & Drop multiple files)</label>
                    <div class="drop-zone" id="dropZone">
                        Click or drag images here to upload
                        <input type="file" id="fileInput" multiple style="display: none;" accept="image/*">
                    </div>
                    <div class="preview-container" id="previewContainer"></div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Product Title</label>
                        <input type="text" id="title" required placeholder="e.g. Meditating Shiva Frame">
                    </div>
                    <div class="form-group">
                        <label>Price (ex: ₹1,599)</label>
                        <input type="text" id="price" required placeholder="₹1,599">
                    </div>
                    <div class="form-group">
                        <label>Discounted Price (optional)</label>
                        <input type="number" id="discount" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="stock" required placeholder="50" min="0">
                    </div>
                    <div class="form-group">
                        <label>Badge (e.g. New Arrival)</label>
                        <input type="text" id="badge" placeholder="Optional">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: auto; padding: 12px 30px;"
                    id="submitBtn">Save Product</button>
                <button type="button" class="btn btn-outline" style="width: auto; padding: 12px 30px; display:none;"
                    id="cancelEditBtn">Cancel</button>
            </form>
        </section>

        <section>
            <h2 class="section-title">Current Inventory</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Info</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryList">
                    <tr>
                        <td colspan="5" style="text-align: center;">Loading inventory...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script>
        // Check rudimentary auth logic
        if (!document.referrer && window.location.protocol.startsWith('http')) { }

        // Drag and Drop Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        let selectedFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                selectedFiles.push(file);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    previewContainer.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        }

        // Fetch and Render Inventory
        async function fetchProducts() {
            try {
                const res = await fetch('/api/products');
                const result = await res.json();
                const tbody = document.getElementById('inventoryList');

                if (result.success && result.data) {
                    tbody.innerHTML = '';
                    result.data.forEach(p => {
                        let stockBadge = `<span class="status-badge status-success">In Stock (${p.stock})</span>`;
                        if (p.stock === 0) {
                            stockBadge = `<span class="status-badge status-danger">Out of Stock</span>`;
                        } else if (p.stock < 10) {
                            stockBadge = `<span class="status-badge status-warning">Only ${p.stock} Left</span>`;
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td><img src="${p.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"></td>
                                <td><strong>${p.title}</strong><br><small>${p.badge || ''}</small></td>
                                <td>${p.price}</td>
                                <td>${stockBadge}</td>
                                <td>
                                    <button class="btn-small btn-edit" onclick="editProduct('${p._id}')">Edit</button>
                                    <button class="btn-small btn-danger" onclick="deleteProduct('${p._id}')">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('Failed to load products', e);
            }
        }

        let allProducts = [];
        async function fetchProductsCache() {
            const res = await fetch('/api/products');
            const result = await res.json();
            if (result.success) allProducts = result.data;
            fetchProducts();
        }

        // Form Submit
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editProductId').value;
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const discount = document.getElementById('discount').value || 0;
            const stock = document.getElementById('stock').value;
            const badge = document.getElementById('badge').value;

            const formData = new FormData();
            formData.append('title', title);
            formData.append('price', price);
            formData.append('discount', discount);
            formData.append('stock', stock);
            formData.append('badge', badge);

            selectedFiles.forEach(file => {
                formData.append('images', file);
            });

            const method = id ? 'PUT' : 'POST';
            const url = id ? '/api/admin/products/' + id : '/api/admin/products';

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = 'Saving...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(url, {
                    method: method,
                    body: formData // multer handles multipart
                });

                if (response.ok) {
                    alert('Product saved successfully!');
                    document.getElementById('productForm').reset();
                    previewContainer.innerHTML = '';
                    selectedFiles = [];
                    document.getElementById('editProductId').value = '';
                    document.getElementById('submitBtn').innerText = 'Save Product';
                    document.getElementById('cancelEditBtn').style.display = 'none';
                    submitBtn.disabled = false;
                    fetchProductsCache();
                } else {
                    throw new Error();
                }
            } catch (err) {
                alert('Failed to save product.');
                submitBtn.innerText = id ? 'Update Product' : 'Save Product';
                submitBtn.disabled = false;
            }
        });

        window.editProduct = (id) => {
            const product = allProducts.find(p => p._id === id);
            if (product) {
                document.getElementById('editProductId').value = product._id;
                document.getElementById('title').value = product.title;
                document.getElementById('price').value = product.price;
                document.getElementById('discount').value = product.discount || 0;
                document.getElementById('stock').value = product.stock;
                document.getElementById('badge').value = product.badge;

                document.getElementById('submitBtn').innerText = 'Update Product';
                document.getElementById('cancelEditBtn').style.display = 'inline-block';
                window.scrollTo(0, 0);
            }
        };

        document.getElementById('cancelEditBtn').addEventListener('click', () => {
            document.getElementById('productForm').reset();
            document.getElementById('editProductId').value = '';
            document.getElementById('submitBtn').innerText = 'Save Product';
            document.getElementById('cancelEditBtn').style.display = 'none';
        });

        window.deleteProduct = async (id) => {
            if (confirm('Are you sure you want to delete this product?')) {
                const res = await fetch('/api/admin/products/' + id, { method: 'DELETE' });
                if (res.ok) {
                    fetchProductsCache();
                }
            }
        };

        fetchProductsCache();
    </script>
</body>

</html>
