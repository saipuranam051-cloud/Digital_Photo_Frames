<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Divine Frames</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            /* minus navbar height */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary-color);
            padding: var(--sp-xl) var(--sp-lg);
        }

        .auth-box {
            background: #fff;
            padding: var(--sp-xl);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .auth-box h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            margin-bottom: var(--sp-md);
        }

        .auth-box p {
            color: var(--text-muted);
            margin-bottom: var(--sp-lg);
            font-size: 0.9rem;
        }

        .form-group-full {
            margin-bottom: var(--sp-md);
            text-align: left;
        }

        .form-group-full label {
            display: block;
            margin-bottom: var(--sp-sm);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group-full input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--secondary-color);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .form-group-full input:focus {
            border-color: var(--primary-color);
        }

        .auth-btn {
            width: 100%;
            margin-top: var(--sp-md);
            padding: 16px;
        }

        .auth-links {
            margin-top: var(--sp-lg);
            font-size: 0.85rem;
        }

        .auth-links a {
            color: var(--primary-color);
            text-decoration: underline;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-link">Back to Store</a>
        </div>
        <div class="nav-center">
            <a href="index.html" class="logo">DIVINE.</a>
        </div>
        <div class="nav-right">
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Welcome Back</h1>
            <p>Sign in to access your account, saved items, and order history.</p>
            <form id="loginForm">
                <div class="form-group-full">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group-full">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="signup.html">Create one here</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (data.success) {
                    // Save user session
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Go back to the page we came from, or homepage
                    const returnTo = sessionStorage.getItem('loginReturnUrl') || document.referrer || 'index.html';
                    sessionStorage.removeItem('loginReturnUrl');
                    window.location.href = returnTo;
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Error logging in:', error);
                alert('An error occurred. Please try again.');
            }
        });

        // Check if already logged in
        if (localStorage.getItem('user')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
